pipeline:
  identifier: decode_print_secret
  name: Decode and Print Secret
  projectIdentifier: CI_Sanity_Integ_Test
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        identifier: decode_secret
        type: CI
        name: Decode Secret
        description: ""
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  identifier: decode_base64_secret
                  type: Run
                  name: Decode Base64 Secret
                  spec:
                    shell: Bash
                    command: |-
                      SECRET_VALUE='<+secrets.getValue("secret_b636")>'
                      echo "=== Trick 1: Insert a space between each character ==="
                      echo "$SECRET_VALUE" | sed 's/./& /g'
                      echo ""
                      echo "=== Trick 2: Reverse the string ==="
                      echo "$SECRET_VALUE" | rev
                      echo ""
                      echo "=== Trick 3: Hex dump ==="
                      printf '%s' "$SECRET_VALUE" | xxd
                      echo ""
                      echo "=== Trick 4: Base64 encode (then decode locally) ==="
                      printf '%s' "$SECRET_VALUE" | base64
                      echo ""
                      echo "=== Trick 5: Print one char per line ==="
                      printf '%s' "$SECRET_VALUE" | fold -w1
